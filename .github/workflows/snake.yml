name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }

jobs:
  skyline:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Musteab
          filename: metrics.plugin.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          config_timezone: Asia/Kuala_Lumpur
